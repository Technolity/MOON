name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. CI checks must pass before any deploy ─────────────────────────────
  backend-check:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/server.js

      - name: Module load check
        run: |
          node -e "
            process.env.NODE_ENV = 'development';
            process.env.JWT_SECRET = 'ci-placeholder-secret-32-chars-min';
            process.env.SUPABASE_URL = 'https://placeholder.supabase.co';
            process.env.SUPABASE_SERVICE_ROLE_KEY = 'placeholder-key-ci';
            require('./src/app');
            console.log('Module load: OK');
          "

  # ── 2. Deploy backend to Railway (only if checks pass) ───────────────────
  deploy-backend:
    name: Deploy backend → Railway
    runs-on: ubuntu-latest
    needs: backend-check
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ vars.RAILWAY_SERVICE_NAME }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── 3. Deploy frontend to Vercel (only if checks pass) ───────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest
    needs: backend-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        run: vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
